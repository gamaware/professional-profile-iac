name: 'Post-Deployment Validation Composite Action'
description: 'Validates deployed infrastructure matches expected state'

inputs:
  working_directory:
    description: 'Directory containing Terraform configuration'
    required: true
  aws_region:
    description: 'AWS region'
    required: false
    default: 'us-east-1'
  expected_domain:
    description: 'Expected domain name for the website'
    required: true

outputs:
  validation_log:
    description: 'Validation script output for downstream steps'
    value: ${{ steps.validate.outputs.validation_log }}

runs:
  using: 'composite'
  steps:
    - name: Get Terraform Outputs
      id: outputs
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      run: ${{ github.workspace }}/.github/scripts/get-terraform-outputs.sh

    - name: Validate Deployment
      id: validate
      shell: bash
      env:
        EXPECTED_DOMAIN: ${{ inputs.expected_domain }}
        WEBSITE_URL: ${{ steps.outputs.outputs.website_url }}
        CLOUDFRONT_ID: ${{ steps.outputs.outputs.cloudfront_id }}
        S3_BUCKET: ${{ steps.outputs.outputs.s3_bucket }}
      run: |
        set +e
        LOG_FILE="$(mktemp)"
        ${{ github.workspace }}/.github/scripts/validate-deployment.sh 2>&1 | tee "$LOG_FILE" >&2
        VALIDATE_EXIT="${PIPESTATUS[0]}"
        set -e

        MAX_CHARS=60000
        if [ "$(wc -c < "$LOG_FILE")" -gt "$MAX_CHARS" ]; then
          head -c "$MAX_CHARS" "$LOG_FILE" > "${LOG_FILE}.trunc"
          printf '\n[...validation log truncated to %s chars...]\n' "$MAX_CHARS" >> "${LOG_FILE}.trunc"
          mv "${LOG_FILE}.trunc" "$LOG_FILE"
        fi

        DELIM="VALIDATION_EOF_${RANDOM}_$(date +%s)"
        {
          echo "validation_log<<$DELIM"
          cat "$LOG_FILE"
          echo "$DELIM"
        } >> "$GITHUB_OUTPUT"

        rm -f "$LOG_FILE"
        exit "$VALIDATE_EXIT"
