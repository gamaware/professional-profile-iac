name: 'Drift Detection Composite Action'
description: 'Detects configuration drift and creates GitHub issues'

inputs:
  terraform_version:
    description: 'Terraform version to use'
    required: false
    default: '1.14.5'
  working_directory:
    description: 'Directory containing Terraform configuration'
    required: true
  aws_region:
    description: 'AWS region'
    required: false
    default: 'us-east-1'
  aws_role_arn:
    description: 'AWS IAM role ARN for OIDC authentication'
    required: true
  github_token:
    description: 'GitHub token for creating issues'
    required: true

outputs:
  has_drift:
    description: 'Whether drift was detected'
    value: ${{ steps.check-drift.outputs.has_drift }}

runs:
  using: 'composite'
  steps:
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ inputs.aws_role_arn }}
        aws-region: ${{ inputs.aws_region }}
        role-session-name: GitHubActions-DriftDetection-${{ github.run_id }}

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: ${{ inputs.terraform_version }}

    - name: Terraform Init
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      run: terraform init

    - name: Terraform Plan (Drift Check)
      id: plan
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      run: ${{ github.workspace }}/.github/scripts/drift-plan.sh

    - name: Check for Drift
      id: check-drift
      shell: bash
      env:
        PLAN_EXIT_CODE: ${{ steps.plan.outputs.exit_code }}
      run: ${{ github.workspace }}/.github/scripts/drift-check.sh

    - name: Create or Update Drift Issue
      if: steps.check-drift.outputs.has_drift == 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github_token }}
        WORKING_DIRECTORY: ${{ inputs.working_directory }}
        GITHUB_RUN_ID: ${{ github.run_id }}
        GITHUB_SERVER_URL: ${{ github.server_url }}
        GITHUB_REPOSITORY: ${{ github.repository }}
      run: ${{ github.workspace }}/.github/scripts/drift-issue.sh
