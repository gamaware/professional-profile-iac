# -----------------------------------------------------------------
# Terraform CI/CD — plan, apply, and destroy for main branch
#
# Runs on: push to main (terraform/**, workflow, action, script, and
#           test changes) or manual workflow_dispatch (apply/destroy)
# Jobs: quality-gate, terraform-plan, terraform-apply (with
#        post-deploy validation + integration tests),
#        terraform-destroy (manual only)
# Concurrency: terraform-state (no cancel — serialized operations)
# Gate: quality-gate polls ci-checks.yml before authorizing plan
# -----------------------------------------------------------------
name: Terraform CI/CD
run-name: >-
  ${{ github.event_name == 'workflow_dispatch'
    && format('Terraform {0}', inputs.action)
    || format('Terraform plan → apply (push: {0})', github.event.head_commit.message) }}

on:
  push:
    branches: [main]
    paths:
      - 'terraform/**'
      - '.github/workflows/terraform-cicd.yml'
      - '.github/actions/terraform-composite/**'
      - '.github/actions/quality-gate-composite/**'
      - '.github/scripts/**'
      - 'tests/**'
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        type: choice
        options:
          - apply
          - destroy
        default: apply

concurrency:
  group: terraform-state
  cancel-in-progress: false

jobs:
  quality-gate:
    name: Quality and Security Gate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'push'
    permissions:
      contents: read
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Run Quality Gate
        uses: ./.github/actions/quality-gate-composite
        with:
          github_token: ${{ github.token }}

  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: quality-gate
    if: always() && (needs.quality-gate.result == 'success' || github.event_name == 'workflow_dispatch')
    permissions:
      id-token: write
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Run Terraform Plan
        uses: ./.github/actions/terraform-composite
        with:
          terraform_command: plan
          working_directory: terraform/website
          aws_role_arn: ${{ secrets.AWS_ROLE_ARN }}
          aws_region: ${{ vars.TF_VAR_aws_region }}

  terraform-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: terraform-plan
    environment: production
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Run Terraform Apply
        uses: ./.github/actions/terraform-composite
        with:
          terraform_command: apply
          working_directory: terraform/website
          aws_role_arn: ${{ secrets.AWS_ROLE_ARN }}
          aws_region: ${{ vars.TF_VAR_aws_region }}

      - name: Post-Deployment Validation
        id: validation
        uses: ./.github/actions/post-deploy-validation-composite
        with:
          working_directory: terraform/website
          aws_region: ${{ vars.TF_VAR_aws_region }}
          expected_domain: alexgarcia.info

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.23'
          cache-dependency-path: tests/go.sum

      - name: Run Integration Tests
        working-directory: tests
        env:
          AWS_REGION: ${{ vars.TF_VAR_aws_region }}
          TF_WORKING_DIR: ${{ github.workspace }}/terraform/website
        shell: bash
        run: |
          set +e
          go test -v -timeout 5m -run TestWebsite ./... 2>&1 | tee test-output.txt
          EXIT_CODE=${PIPESTATUS[0]}
          set -e
          {
            echo "### Integration Tests: Website"
            echo '```'
            grep -E '(PASS|FAIL|ok |--- )' test-output.txt || tail -20 test-output.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          exit "$EXIT_CODE"

  terraform-destroy:
    name: Terraform Destroy
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name == 'workflow_dispatch' && inputs.action == 'destroy'
    environment: production
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Run Terraform Destroy
        uses: ./.github/actions/terraform-composite
        with:
          terraform_command: destroy
          working_directory: terraform/website
          aws_role_arn: ${{ secrets.AWS_ROLE_ARN }}
          aws_region: ${{ vars.TF_VAR_aws_region }}

      - name: Post-Destroy Validation
        env:
          EXPECTED_DOMAIN: alexgarcia.info
        run: ${{ github.workspace }}/.github/scripts/validate-destroy.sh
