# -----------------------------------------------------------------
# Update Pre-commit Hooks — auto-update hook versions weekly
#
# Runs on: weekly (Sunday midnight UTC) or manual dispatch
# Jobs: update-hooks (runs pre-commit autoupdate, opens PR)
# Concurrency: pre-commit-update (no cancel — single run)
# -----------------------------------------------------------------
name: Update Pre-commit Hooks
run-name: "Update Pre-commit Hooks (${{ github.event_name }})"

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

concurrency:
  group: pre-commit-update
  cancel-in-progress: false

jobs:
  update-hooks:
    name: Update Pre-commit Hooks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Update Hooks
        uses: ./.github/actions/update-pre-commit-composite
        with:
          github_token: ${{ secrets.PRE_COMMIT_PAT }}