name: Quality Checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  link-checker:
    name: Check Links
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Check markdown links
        id: linkcheck
        uses: gaurav-nelson/github-action-markdown-link-check@v1
        with:
          config-file: '.markdown-link-check.json'
          use-quiet-mode: 'yes'
        continue-on-error: true

      - name: Post summary
        if: always()
        run: |
          MD_COUNT=$(find . -name '*.md' -not -path './.git/*' | wc -l | tr -d ' ')
          STATUS="${{ steps.linkcheck.outcome == 'success' && 'Passed' || 'Failed' }}"
          {
            echo "## Link Checker"
            echo ""
            echo "- Markdown files scanned: $MD_COUNT"
            echo "- Status: $STATUS (continue-on-error)"
          } >> "$GITHUB_STEP_SUMMARY"

  markdown-lint:
    name: Markdown Linting
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Lint Markdown files
        id: mdlint
        uses: DavidAnson/markdownlint-cli2-action@v22
        with:
          globs: '**/*.md !modules/*/README.md'
          config: '.markdownlint.yaml'

      - name: Post summary
        if: always()
        run: |
          MD_COUNT=$(find . -name '*.md' -not -path './.git/*' -not -path './modules/*/README.md' | wc -l | tr -d ' ')
          STATUS="${{ steps.mdlint.outcome == 'success' && 'Passed' || 'Failed' }}"
          {
            echo "## Markdown Linting"
            echo ""
            echo "- Files scanned: $MD_COUNT"
            echo "- Status: $STATUS"
          } >> "$GITHUB_STEP_SUMMARY"

  shell-check:
    name: Shell Script Validation
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Run ShellCheck
        id: shellcheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: '.'
          severity: warning

      - name: Post summary
        if: always()
        run: |
          SH_COUNT=$(find . -name '*.sh' -not -path './.git/*' | wc -l | tr -d ' ')
          STATUS="${{ steps.shellcheck.outcome == 'success' && 'Passed' || 'Failed' }}"
          {
            echo "## Shell Script Validation"
            echo ""
            echo "- Scripts scanned: $SH_COUNT"
            echo "- Severity: warning"
            echo "- Status: $STATUS"
          } >> "$GITHUB_STEP_SUMMARY"

  yaml-lint:
    name: YAML Validation
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Lint YAML files
        id: yamllint
        uses: ibiqlik/action-yamllint@v3
        with:
          file_or_dir: '.'
          config_file: '.yamllint.yml'
          strict: false

      - name: Post summary
        if: always()
        run: |
          YAML_COUNT=$(find . \( -name '*.yml' -o -name '*.yaml' \) -not -path './.git/*' | wc -l | tr -d ' ')
          STATUS="${{ steps.yamllint.outcome == 'success' && 'Passed' || 'Failed' }}"
          {
            echo "## YAML Validation"
            echo ""
            echo "- Files scanned: $YAML_COUNT"
            echo "- Status: $STATUS"
          } >> "$GITHUB_STEP_SUMMARY"

  file-structure:
    name: Validate Repository Structure
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Check required files
        id: structure
        run: |
          echo "Checking repository structure..."
          errors=0

          for file in LICENSE README.md .gitignore CLAUDE.md CODEOWNERS CONTRIBUTING.md SECURITY.md; do
            if [ ! -f "$file" ]; then
              echo "ERROR: $file missing"
              errors=$((errors + 1))
            else
              echo "$file found"
            fi
          done

          for dir in .github/ISSUE_TEMPLATE docs modules; do
            if [ ! -d "$dir" ]; then
              echo "ERROR: $dir/ directory missing"
              errors=$((errors + 1))
            else
              echo "$dir/ found"
            fi
          done

          if [ "$errors" -gt 0 ]; then
            echo "$errors required files/directories missing"
            exit 1
          fi

          echo "Repository structure validation complete"

      - name: Post summary
        if: always()
        run: |
          STATUS="${{ steps.structure.outcome == 'success' && 'Passed' || 'Failed' }}"
          {
            echo "## Repository Structure"
            echo ""
            echo "- Required files and directories verified"
            echo "- Status: $STATUS"
          } >> "$GITHUB_STEP_SUMMARY"

  readme-quality:
    name: README Quality Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Check README content
        id: readme
        run: |
          if ! grep -q "## " README.md; then
            echo "WARNING: README.md should have sections (##)"
          fi

          if ! grep -q -i "author\|created by" README.md; then
            echo "WARNING: README.md should have author information"
          fi

          if ! grep -q -i "license" README.md; then
            echo "WARNING: README.md should mention license"
          fi

          echo "README quality check complete"

      - name: Post summary
        if: always()
        run: |
          STATUS="${{ steps.readme.outcome == 'success' && 'Passed' || 'Failed' }}"
          {
            echo "## README Quality"
            echo ""
            echo "- Sections, author, and license checked"
            echo "- Status: $STATUS"
          } >> "$GITHUB_STEP_SUMMARY"

  actions-security:
    name: Actions Security (zizmor)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install zizmor
        env:
          ZIZMOR_VERSION: "1.23.1"
        run: |
          tmpdir="$(mktemp -d)"
          curl -fsL "https://github.com/woodruffw/zizmor/releases/download/v${ZIZMOR_VERSION}/zizmor-x86_64-unknown-linux-gnu.tar.gz" \
            | tar xz -C "$tmpdir"
          sudo mv "$tmpdir/zizmor" /usr/local/bin/zizmor

      - name: Run zizmor
        id: zizmor
        run: zizmor --config zizmor.yml .github/workflows/

      - name: Post summary
        if: always()
        run: |
          WF_COUNT=$(find .github/workflows -name '*.yml' | wc -l | tr -d ' ')
          STATUS="${{ steps.zizmor.outcome == 'success' && 'Passed' || 'Failed' }}"
          {
            echo "## Actions Security (zizmor)"
            echo ""
            echo "- Workflows scanned: $WF_COUNT"
            echo "- Status: $STATUS"
          } >> "$GITHUB_STEP_SUMMARY"

  prose-lint:
    name: Prose Linting (Vale)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install Vale
        env:
          VALE_VERSION: "3.13.1"
        run: |
          tmpdir="$(mktemp -d)"
          wget -q "https://github.com/errata-ai/vale/releases/download/v${VALE_VERSION}/vale_${VALE_VERSION}_Linux_64-bit.tar.gz"
          tar xzf "vale_${VALE_VERSION}_Linux_64-bit.tar.gz" -C "$tmpdir" vale
          sudo mv "$tmpdir/vale" /usr/local/bin/vale

      - name: Run Vale
        id: vale
        run: |
          vale sync
          find . -name '*.md' -not -path './styles/*' -not -path './.git/*' \
            -not -path './modules/*/README.md' \
            -exec vale {} +

      - name: Post summary
        if: always()
        run: |
          MD_COUNT=$(find . -name '*.md' -not -path './.git/*' -not -path './styles/*' \
            -not -path './modules/*/README.md' | wc -l | tr -d ' ')
          STATUS="${{ steps.vale.outcome == 'success' && 'Passed' || 'Failed' }}"
          {
            echo "## Prose Linting (Vale)"
            echo ""
            echo "- Files scanned: $MD_COUNT"
            echo "- Styles: write-good, proselint"
            echo "- Status: $STATUS"
          } >> "$GITHUB_STEP_SUMMARY"
