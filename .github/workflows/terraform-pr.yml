# -----------------------------------------------------------------
# Terraform PR Checks — lint, security, test, plan for pull requests
#
# Runs on: PRs targeting main (terraform/**, workflow, action, and
#           script changes)
# Jobs: lint-and-security, terraform-test, terraform-plan, infracost
# Concurrency: cancels in-progress runs per PR number
# -----------------------------------------------------------------
name: Terraform PR Checks
run-name: >-
  Terraform PR checks (PR #${{ github.event.pull_request.number }})

on:
  pull_request:
    branches: [main]
    paths:
      - 'terraform/**'
      - '.github/workflows/terraform-pr.yml'
      - '.github/actions/lint-and-security-composite/**'
      - '.github/actions/terraform-composite/**'
      - '.github/scripts/**'

concurrency:
  group: terraform-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  lint-and-security:
    name: Lint and Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Run Lint and Security
        uses: ./.github/actions/lint-and-security-composite
        with:
          working_directory: terraform/website

  terraform-test:
    name: Terraform Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.14.5"
          terraform_wrapper: false

      - name: Override Backend
        working-directory: terraform/website
        shell: bash
        run: printf 'terraform {\n  backend "local" {}\n}\n' > backend_override.tf

      - name: Terraform Init
        working-directory: terraform/website
        run: terraform init

      - name: Run Terraform Tests
        working-directory: terraform/website
        shell: bash
        run: |
          set +e
          terraform test -verbose 2>&1 | tee test-output.txt
          EXIT_CODE=${PIPESTATUS[0]}
          set -e
          {
            echo "### Terraform Test: website"
            echo '```'
            tail -20 test-output.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          exit "$EXIT_CODE"

  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [lint-and-security, terraform-test]
    permissions:
      id-token: write
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Run Terraform Plan
        uses: ./.github/actions/terraform-composite
        with:
          terraform_command: plan
          working_directory: terraform/website
          aws_role_arn: ${{ secrets.AWS_ROLE_ARN }}
          aws_region: ${{ vars.TF_VAR_aws_region }}

  infracost:
    name: Infracost Cost Estimate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Infracost
        uses: infracost/actions/setup@v3
        with:
          api-key: ${{ secrets.INFRACOST_API_KEY }}

      - name: Generate cost breakdown
        run: |
          infracost breakdown --path=terraform/website \
            --format=json \
            --out-file=/tmp/infracost.json

      - name: Post cost comment
        run: |
          infracost comment github \
            --path=/tmp/infracost.json \
            --repo="$GITHUB_REPOSITORY" \
            --github-token=${{ github.token }} \
            --pull-request=${{ github.event.pull_request.number }} \
            --behavior=update

      - name: Post summary
        if: always()
        run: |
          TOTAL=$(jq -r '.totalMonthlyCost // "0"' /tmp/infracost.json)
          RESOURCES=$(jq -r '.projects[0].breakdown.resources | length' /tmp/infracost.json)
          {
            echo "## Infracost Cost Estimate"
            echo ""
            echo "- Resources detected: $RESOURCES"
            echo "- Monthly cost: \$${TOTAL}"
            echo "- Status: Posted to PR comment"
          } >> "$GITHUB_STEP_SUMMARY"
