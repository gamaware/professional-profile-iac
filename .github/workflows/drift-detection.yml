# -----------------------------------------------------------------
# Drift Detection — detect Terraform configuration drift
#
# Runs on: daily at 9 AM UTC (3 AM CST) or manual dispatch
# Jobs: detect-drift (runs terraform plan, opens issue on drift)
# Concurrency: terraform-state (shared with CI/CD — serialized)
# -----------------------------------------------------------------
name: Drift Detection
run-name: "Drift Detection (${{ github.event_name }})"

on:
  schedule:
    # Run daily at 9 AM UTC (3 AM CST)
    - cron: '0 9 * * *'
  workflow_dispatch:

concurrency:
  group: terraform-state
  cancel-in-progress: false

jobs:
  detect-drift:
    name: Detect Configuration Drift
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      id-token: write
      contents: read
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Detect Drift
        uses: ./.github/actions/drift-detection-composite
        with:
          working_directory: terraform/website
          aws_role_arn: ${{ secrets.AWS_ROLE_ARN }}
          aws_region: ${{ vars.TF_VAR_aws_region }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
