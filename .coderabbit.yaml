language: en-US
reviews:
  auto_review:
    enabled: true
    drafts: false
  path_instructions:
    - path: "terraform/**/*.tf"
      instructions: >
        Review for Terraform best practices, proper variable usage,
        no hardcoded values, and security considerations.
    - path: ".github/workflows/**"
      instructions: >
        Review for GitHub Actions security best practices, pinned action
        versions, and least-privilege permissions.
    - path: "terraform/website/modules/**"
      instructions: >
        Review for module reusability, proper input/output definitions,
        and documentation completeness.
    - path: "CLAUDE.md"
      instructions: >
        Review for accuracy against actual repo structure, conventions,
        and CI/CD pipeline configuration.
    - path: ".github/scripts/**"
      instructions: >
        Review for shell scripting best practices, proper error handling,
        and shellcheck/shellharden compliance.
  path_filters:
    - "!.terraform.lock.hcl"
chat:
  auto_reply: true
